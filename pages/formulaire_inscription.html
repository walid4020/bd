<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <title> Inscription </title>
        <!-- balise permettant de relier notre HTML au framework bulma-->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.0/css/bulma.min.css">
    </head>
        <body style="background-color: var(--bulma-success-dark);">
        <section style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background-color: var(--bulma-success-dark); padding: 1.5rem;">
            <div style="display: flex; width: 100%; max-width: 1000px; border-radius: 16px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.12);">

                <!-- Panneau gauche : image de présentation, masquée sur mobile -->
                <div class="is-hidden-mobile" style="flex: 0 0 45%; background-image: url('../assets/slogan_inscription.png'); background-size: cover; background-position: center;">
                </div>

                <!-- Panneau droit : formulaire d'inscription -->
                <div style="flex: 1; background: white; padding: 3rem 2.5rem; overflow-y: auto;">

        <form action="../api/inscription_reception_des_donnees.php" method="post">
        <h1 class="has-text-centered title" style="color: var(--bulma-success-dark);"> Inscription </h1>

        <!-- Zones de texte -->
         <!-- CSS : Ajouter un espacement entre le cadre et le label (2 div)-->
                <!-- Prénom et Nom côte à côte sur la même ligne -->
            <div class="columns">
                <div class="column">
                    <div class="field">
                        <label class="label mb-3" for="id_pour_input_prenom"> Prénom : </label>
                        <div class="control">
                            <input class="input is-small" type="text" name="firstname" placeholder="Claude" id="id_pour_input_prenom" required>
                        </div>
                    </div>
                </div>
                <div class="column">
                    <div class="field">
                        <label class="label mb-3" for="id_pour_input_nom"> Nom : </label>
                        <div class="control">
                            <input class="input is-small" type="text" name="lastname" placeholder="Dupont" id="id_pour_input_nom" required>
                        </div>
                    </div>
                </div>
            </div>
        
          <!-- CSS : Ajouter un espacement entre le cadre et le label (2 div)-->
           <div class="field">
        <label class="label mb-3" for="id_pour_input_datedenaissance"> Date de naissance : </label>
            <div class="control">
            <!-- CSS : Rendre le cadre moins épais-->
            <input class="input is-small" type="date" name="birthdate" id="id_pour_input_datedenaissance" required>
            </div>
           </div>

           <!-- Champ téléphone : ajouté car la colonne phone_number est obligatoire (NOT NULL) dans la table users en BD -->
           <!-- CSS : Ajouter un espacement entre le cadre et le label (2 div)-->
           <div class="field">
        <label class="label mb-3" for="id_pour_input_telephone"> Numéro de téléphone : </label>
            <div class="control">
            <!-- type="tel" : indique au navigateur que c'est un numéro de téléphone (clavier adapté sur mobile) -->
            <input class="input is-small" type="tel" name="phone_number" id="id_pour_input_telephone" placeholder="+32 470 00 00 00" required>
            </div>
           </div>

           <!-- Champ pays : ajouté car la colonne country est obligatoire (NOT NULL) dans la table users en BD -->
           <!-- CSS : Ajouter un espacement entre le cadre et le label (2 div)-->
           <div class="field">
        <label class="label mb-3" for="id_pour_input_pays"> Pays : </label>
            <div class="control">
            <input class="input is-small" type="text" name="country" id="id_pour_input_pays" placeholder="Belgique" required>
            </div>
           </div>
        
           <!-- CSS : Ajouter un espacement entre le cadre et le label (2 div)-->
            <div class="field">
        <label class="label mb-3" for="id_pour_input_email"> Email: </label>
            <div class="control"> 
            <!-- CSS : Rendre le cadre moins épais-->
            <input class="input is-small" type="email"name="email" placeholder="exemple.email@gmail.com" id="id_pour_input_email"required>
            </div>
            </div>

            <!-- CSS : Ajouter un espacement entre le cadre et le label (2 div)-->
             <div class="field">
         <label class="label mb-3" for="id_pour_input_mdp"> Mot de passe :</label>
            <div class="control has-icons-right">
                <input class="input is-small" type="password" id="id_pour_input_mdp" name="password" placeholder="Entrez votre mot de passe" minlength="8" required>
                <span class="icon is-right" style="pointer-events: all; cursor: pointer;" onclick="togglePassword('id_pour_input_mdp', this)">
                    🙈
                </span>
            </div>
             </div>


        <div class="field">
            <label class="label mb-3" for="id_pour_input_mdp_confirmation"> Confirmer le mot de passe : </label>
            <div class="control has-icons-right">
                <input class="input is-small" type="password" id="id_pour_input_mdp_confirmation" name="password_confirm" placeholder="Confirmez votre mot de passe" required>
                <span class="icon is-right" style="pointer-events: all; cursor: pointer;" onclick="togglePassword('id_pour_input_mdp_confirmation', this)">
                    🙈
                </span>
            </div>
        </div>

        <!-- Zone bouton d'envoie-->
         <!-- CSS : Ajout de has-text-white + espacer du reste des champs-->
         <button type ="submit" name="bouton submit" class="button is-primary is-fullwidth has-text-white mt-4"> Envoyer </button>
         <br>
         <p class="has-text-centered">
             Déjà un compte ? <a href="../index.html">Se connecter</a>
         </p>
        </form>
                </div>
            </div>
        </section>
        <script>
            function togglePassword(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = '🙉';  // mot de passe visible
            } else {
                input.type = 'password';
                icon.textContent = '🙈';  // mot de passe caché
            }
        }
        </script>
    </body>
</html>
