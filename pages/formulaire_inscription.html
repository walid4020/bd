<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <title> Inscription </title>
        <!-- balise permettant de relier notre HTML au framework bulma-->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.0/css/bulma.min.css">
    </head>
    <body>
        <!-- CSS : création du "contenant" du formulaire cardre blanc-->
        <section class="section">
            <div class="container" style="max-width: 500px;">
                <div class="box">
        <form action="../api/inscription_reception_des_donnees.php" method="post">
        <!-- CSS : ajout de classe pour changer l'apparence du titre (voir pour changer de couleur)-->
        <h1 class="has-text-centered title has-text-primary-bold"> Inscription </h1>

        <!-- Zones de texte -->
         <!-- CSS : Ajouter un espacement entre le cadre et le label (2 div)-->
         <div class="field">
        <label class="label mb-3" for="id_pour_input_prenom"> Prénom : </label>
           <div class="control">
            <!-- CSS : Rendre le cadre moins épais-->
            <input class="input is-small" type="text"name="firstname" placeholder="Claude" id="id_pour_input_prenom" required> 
           </div>
         </div>
         <!-- CSS : Ajouter un espacement entre le cadre et le label (2 div)-->
          <div class="field">
        <label class="label mb-3" for="id_pour_input_nom"> Nom : </label>
            <div class="control">
            <!-- CSS : Rendre le cadre moins épais-->
            <input class="input is-small" type="text"name="lastname" placeholder="Dupont" id="id_pour_input_nom"required> 
            </div>
          </div>
        
          <!-- CSS : Ajouter un espacement entre le cadre et le label (2 div)-->
           <div class="field">
        <label class="label mb-3" for="id_pour_input_datedenaissance"> Date de naissance : </label>
            <div class="control">
            <!-- CSS : Rendre le cadre moins épais-->
            <input class="input is-small" type="date"name="birthdate" id="id_pour_input_datedenaissance"> 
            </div>
           </div>
        
           <!-- CSS : Ajouter un espacement entre le cadre et le label (2 div)-->
            <div class="field">
        <label class="label mb-3" for="id_pour_input_email"> Email: </label>
            <div class="control"> 
            <!-- CSS : Rendre le cadre moins épais-->
            <input class="input is-small" type="email"name="email" placeholder="exemple.email@gmail.com" id="id_pour_input_email"required>
            </div>
            </div>

            <!-- CSS : Ajouter un espacement entre le cadre et le label (2 div)-->
             <div class="field">
         <label class="label mb-3" for="id_pour_input_mdp"> Mot de passe :</label>
            <div class="control">
           <!-- CSS : Rendre le cadre moins épais-->
            <input class="input is-small" type="password" id="id_pour_input_mdp" name="password" placeholder="Entrez votre mot de passe" minlength="8"required>
            </div>
             </div>


        <!-- AJOUTER qlq chose pour obliger à ce que le mdp soit le même dans la zone 7 et dans la zone 8-->
        <!-- CSS : Ajouter un espacement entre le cadre et le label (2 div)-->
         <div class="field">
        <label class="label mb-3" for="id_pour_input_mdp_confirmation">Confirmez le mot de passe :</label>
            <div class="control">
            <!-- CSS : Rendre le cadre moins épais-->
            <input class="input is-small" type="password" id="id_pour_input_mdp_confirmation" name="password_confirm" placeholder="Confirmez votre mot de passe" required>
            </div>
         </div>

        <!-- Zone bouton d'envoie-->
         <!-- CSS : Ajout de has-text-white + espacer du reste des champs-->
         <button type ="submit" name="bouton submit" class="button is-primary is-fullwidth has-text-white mt-4"> Envoyer </button>
         <br>
         <p class="has-text-centered">
             Déjà un compte ? <a href="../index.html">Se connecter</a>
         </p>
        </form>
                </div>
            </div>
        </section>
    </body>
</html>
