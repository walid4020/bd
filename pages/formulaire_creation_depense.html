<!DOCTYPE html>
<html lang="fr"> 
    <head>
        <meta charset="UTF-8">
        <title> Création d'une dépense </title>
        <!-- balise permettant de relier notre HTML au framework bulma-->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.0/css/bulma.min.css">
    </head>
    <body>  
         <!-- Barre de navigation principale, fond vert foncé sur toute la largeur de l'écran -->
        <nav class="navbar is-success" style="background-color: var(--bulma-success-dark);"  role="navigation" aria-label="navigation principale">

            <!-- Partie gauche : logo cliquable qui ramène à l'accueil -->
            <div class="navbar-brand">
                <a class="navbar-item" href="../index.html">
                    <img src="../assets/logo.png" alt="Divvyo" style="max-height: 56px;">
                </a>

                <!-- Bouton hamburger : visible uniquement sur mobile, remplace les liens du menu.
                    Les 3 spans forment les 3 traits de l'icône hamburger.
                    aria-hidden="true" les masque aux lecteurs d'écran car le bouton parent a déjà un aria-label. -->
                <a role="button" class="navbar-burger" id="burger" aria-label="menu" aria-expanded="false">
                    <span aria-hidden="true"></span>
                    <span aria-hidden="true"></span>
                    <span aria-hidden="true"></span>
                </a>
            </div>

            <!-- Menu principal : masqué sur mobile par défaut, affiché quand la classe is-active est ajoutée via JS -->
            <div class="navbar-menu" id="navMenu">

                <!-- navbar-end pousse les liens vers la droite de la barre -->
                <div class="navbar-end">
                    <a href="../index.html" class="navbar-item has-text-white">Accueil</a>
                    <a href="../api/formulaire_choix_de_groupe.php" class="navbar-item has-text-white">Mes groupes</a>
                    <a href="formulaire_creation_groupe.html" class="navbar-item has-text-white">Créer un groupe</a>
                    <a href="formulaire_creation_depense.html" class="navbar-item has-text-white">Créer une dépense</a>
                    <!-- Déconnexion : détruit la session PHP et redirige vers la page de connexion -->
                    <a href="../api/deconnexion.php" class="navbar-item has-text-white" style="font-weight: 600;">Se déconnecter</a>
                </div>
            </div>
        </nav>

        <!-- Sur mobile, un clic sur le hamburger ouvre ou ferme le menu
            en ajoutant/retirant la classe is-active sur les deux éléments concernés. -->
        <script>
            document.getElementById('burger').addEventListener('click', function() {
                this.classList.toggle('is-active');
                document.getElementById('navMenu').classList.toggle('is-active');
            });
        </script>
        <!-- CSS : création du "contenant" du formulaire cardre blanc-->
        <section class="section">
            <div class="container" style="max-width: 500px;">
                <div class="box">
        <!-- enctype : pour pouvoir recevoir une image ou un pdf -->
        <form action="creation_depense_reception_des_donnees.php" method="post" enctype="multipart/form-data">
        <!-- CSS : ajout de classe pour changer l'apparence du titre (voir pour changer de couleur)-->
        <h1 class="has-text-centered title has-text-primary-bold"> Créer une nouvelle dépense </h1>
        <p>  
         <div class="field">
            <label class="label mb-3" for="id_pour_input_nom_depense"> Nom de la dépense: </label>
             <div class="control">
                <!-- CSS : Rendre le cadre moins épais-->
                <input class="input is-small" type="text"name="expense name" placeholder="restaurant" id="id_pour_input_nom_depense"required>
            </div>
         </div>
        </p>
        <p>
        <div class="field">
        <label class="label mb-3" for="id_pour_input_montant"> Montant :</label>
            <div class="control">
            <!-- CSS : Rendre le cadre moins épais-->
            <input class="input is-small" type="number" step="0.01" id="id_pour_input_montant" name="amount" placeholder="45€" required>
                </div>
            </div>
        </p>
        <p>
        <div class="field">
        <label class="label mb-3" for="id_pour_input_devises_montant"> Devise : </label>
           <div class="control">  
        <!-- CSS : ajout div class = (2) -->
            <div class="control">
                <div class="select is-fullwidth">
                    <select name="currencies"id="id_pour_input_devises_montant">
                        <option value="EUR">Euro</option>
                        <option value="USD">Dollard américain</option>
                        <option value="JPY">Yen</option>
                        <option value="GBP">Livre sterling</option>
                        <option value="AUD"> Dollard australien </option>
                        <option value="Autre">Autre</option>
                    </select> 
                </div>
            </div>
           </div>
        </div>
        </p>
        <p>
            <!-- Trouver un moyen pour que les noms proposés soient les noms des personnes participant au groupe -->
            <!-- à faire plus tard avec une boucle en PHP--> 
        <div class="field">
        <label class="label mb-3" for="id_pour_input_paye_par"> Payé par : </label>
             <div class="control">
                <div class="select is-fullwidth">
                    <select name="payed by"id="id_pour_input_paye_par">
                        <option value="1">Personne 1 </option>
                        <option value="2">Personne 2</option>
                        <option value="3">Personne 3</option>
                        <option value="4">Personne 4 </option>
                    </select>
                </div>
             </div>
        </div>
        </p>   
        <p>  
        <div class="field">
             <label class="label mb-3" for="id_pour_input_date"> Date :</label>
            <div class="control">
                <div class="control">
            <!-- CSS : Rendre le cadre moins épais-->
            <input class="input is-small" type="datetime-local" id="id_pour_input_date" name="expense date">
                </div>
            </div>
        </div>
        </p>
        <p>
        <!-- Insertion d'un ticket de caisse -->
         <label class="label mb-3" for="id_pour_ticket">Ticket de caisse (PDF ou Image) :</label>
            <input type="file" id="id_pour_ticket" name="receipt" accept=".pdf,image/*">
        </p>
        <p>
        <!-- CSS : Ajout de has-text-white-->
            <button type="submit" name="bouton submit" class="button is-primary is-fullwidth has-text-white mt-4"> Envoyer </button>
        </p>
        </form>
                </div>
            </div>
        </section>
    </body>
</html>
