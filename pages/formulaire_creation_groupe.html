<!DOCTYPE html>
<html lang="fr"> 
    <head>
        <meta charset="UTF-8">
        <!--force le light mode -->
        <meta name="color-scheme" content="light">
        <title> Création groupe </title>
        <!-- balise permettant de relier notre HTML au framework bulma-->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.0/css/bulma.min.css">
    </head>
    <body style="background-color: var(--bulma-success-dark);">
        <!-- En-tête : logo cliquable qui ramène au dashboard, bouton déconnexion à droite -->
        <div style="display: flex; justify-content: space-between; align-items: center; padding: 0.8rem 1.5rem;">
            <a href="../api/dashboard.php">
                <img src="../assets/logo.png" alt="Divvyo" style="max-height: 50px;">
            </a>
            <a href="../api/deconnexion.php" class="button is-danger is-light is-small">Se déconnecter</a>
        </div>
        <!-- CSS : création du "contenant" du formulaire cadre blanc-->
        <section class="section" style="min-height: calc(100vh - 70px);">
            <div class="container" style="max-width: 500px;">
                <div class="box">

        <!-- action corrigé : pointe vers le bon fichier PHP dans api/ -->
        <form action="../api/creation_groupe_reception_des_donnees.php" method="post">

        <!-- CSS : ajout de classe pour changer l'apparence du titre -->
        <h1 class="has-text-centered title has-text-primary-bold"> Créer un groupe de dépense </h1>

        <!-- Nom du groupe → colonne "name" dans account_groups -->
        <div class="field">
            <label class="label mb-3" for="id_pour_input_nom_groupe"> Nom du groupe : </label>
            <div class="control">
                <input class="input is-small" type="text" name="group_name" placeholder="Vacances Barcelone" id="id_pour_input_nom_groupe" required>
            </div>
        </div>

        <!-- Description du groupe → colonne "description" dans account_groups -->
        <div class="field">
            <label class="label mb-3" for="id_pour_input_description_groupe"> Description du groupe : </label>
            <div class="control">
                <input class="input is-small" type="text" id="id_pour_input_description_groupe" name="group_description" required>
            </div>
        </div>

        <!-- Devise → colonne "currency" dans account_groups -->
        <div class="field">
            <label class="label mb-3" for="id_pour_input_devises"> Devise : </label>
            <div class="control">
                <div class="select is-fullwidth">
                    <select name="currency" id="id_pour_input_devises">
                        <option value="EUR">Euro</option>
                        <option value="USD">Dollar américain</option>
                        <option value="JPY">Yen</option>
                        <option value="GBP">Livre sterling</option>
                        <option value="AUD">Dollar australien</option>
                        <option value="Autre">Autre</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Membres : on entre leurs emails pour les retrouver dans la table users -->
        <!-- Membre 1 obligatoire, les autres optionnels -->
                <!-- Membres : champs dynamiques, on peut en ajouter autant qu'on veut -->
        <div class="field">
            <label class="label mb-3"> Membres : </label>
            <!-- Conteneur où les champs sont ajoutés dynamiquement -->
            <div id="membres_container">
                <!-- Premier membre obligatoire -->
                <div class="control mb-2">
                    <input class="input is-small" type="email" name="members[]" placeholder="alexia@gmail.com" required>
                </div>
            </div>
        </div>

        <!-- Bouton pour ajouter un nouveau champ email -->
        <button type="button" class="button  is-success is-soft is-small mb-4" onclick="ajouterMembre()">
            + Ajouter un membre
        </button>

        <!-- Bouton de soumission -->
        <button type="submit" class="button is-success is-soft is-fullwidth mt-4"> Créer le groupe </button>

        <!-- Lien retour vers la page d'accueil -->
        <br>
        <p class="has-text-centered">
            <a href="../api/dashboard.php">← Retour à l'accueil</a>
        </p>

        </form>
                </div>
            </div>
        </section>
                <script>
            // Ajoute un nouveau champ email dans le conteneur
            function ajouterMembre() {
                const container = document.getElementById('membres_container');
                const div = document.createElement('div');
                div.className = 'control mb-2';
                div.style.display = 'flex';
                div.style.gap = '8px';
                // Champ email + bouton ✕ pour supprimer ce membre
                div.innerHTML = `
                    <input class="input is-small" type="email" name="members[]" placeholder="email@exemple.com">
                    <button type="button" class="button is-danger is-light is-small" onclick="this.parentElement.remove()">✕</button>
                `;
                container.appendChild(div);
            }
        </script>
    </body>
</html>
