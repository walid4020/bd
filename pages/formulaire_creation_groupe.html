<!DOCTYPE html>
<html lang="fr"> 
    <head>
        <meta charset="UTF-8">
        <title> Création groupe </title>
        <!-- balise permettant de relier notre HTML au framework bulma-->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.0/css/bulma.min.css">
    </head>
    <body>
         <!-- Barre de navigation principale : is-success applique le fond vert Bulma, role et aria-label améliorent l'accessibilité -->
        <nav class="navbar is-success-dark" role="navigation" aria-label="navigation principale">

            <!-- Partie gauche de la navbar : contient le logo et le bouton -->
            <div class="navbar-brand">

                <!-- Logo cliquable qui ramène à l'accueil -->
                <a class="navbar-item" href="../index.html">
                    <img src="../assets/logo.png" alt="Divvyo" style="max-height: 40px;">
                </a>

                <!-- Bouton : visible uniquement sur mobile, remplace les liens du menu.
                    Les 3 spans forment les 3 traits de l'icône hamburger.
                    aria-hidden="true" les masque aux lecteurs d'écran car le bouton parent a déjà un aria-label. -->
                <a role="button" class="navbar-burger" id="burger" aria-label="menu" aria-expanded="false">
                    <span aria-hidden="true"></span>
                    <span aria-hidden="true"></span>
                    <span aria-hidden="true"></span>
                </a>
            </div>

            <!-- Menu principal : masqué sur mobile par défaut, affiché quand la classe is-active est ajoutée via JS -->
            <div class="navbar-menu" id="navMenu">

                <!-- navbar-end pousse les liens vers la droite de la barre -->
                <div class="navbar-end">
                    <a href="../index.html" class="navbar-item has-text-white">Accueil</a>
                    <a href="formulaire_choix_de_groupe.php" class="navbar-item has-text-white">Mes groupes</a>
                    <a href="../pages/formulaire_creation_groupe.html" class="navbar-item has-text-white">Créer un groupe</a>
                    <a href="../pages/formulaire_creation_depense.html" class="navbar-item has-text-white">Créer une dépense</a>
                    <a href="deconnexion.php" class="navbar-item has-text-white" style="font-weight:600;">Se déconnecter</a>
                </div>
            </div>
        </nav>

        <script>
            /* Sur mobile, un clic sur le hamburger ouvre ou ferme le menu
            en ajoutant/retirant la classe is-active sur les deux éléments concernés. */
            document.getElementById('burger').addEventListener('click', function() {
                this.classList.toggle('is-active');
                document.getElementById('navMenu').classList.toggle('is-active');
            });
        </script>
        <!-- CSS : création du "contenant" du formulaire cadre blanc-->
        <section class="section">
            <div class="container" style="max-width: 500px;">
                <div class="box">

        <!-- action corrigé : pointe vers le bon fichier PHP dans api/ -->
        <form action="../api/creation_groupe_reception_des_donnees.php" method="post">

        <!-- CSS : ajout de classe pour changer l'apparence du titre -->
        <h1 class="has-text-centered title has-text-primary-bold"> Créer un groupe de dépense </h1>

        <!-- Nom du groupe → colonne "name" dans account_groups -->
        <div class="field">
            <label class="label mb-3" for="id_pour_input_nom_groupe"> Nom du groupe : </label>
            <div class="control">
                <input class="input is-small" type="text" name="group_name" placeholder="Vacances Barcelone" id="id_pour_input_nom_groupe" required>
            </div>
        </div>

        <!-- Description du groupe → colonne "description" dans account_groups -->
        <div class="field">
            <label class="label mb-3" for="id_pour_input_description_groupe"> Description du groupe : </label>
            <div class="control">
                <input class="input is-small" type="text" id="id_pour_input_description_groupe" name="group_description" required>
            </div>
        </div>

        <!-- Devise → colonne "currency" dans account_groups -->
        <div class="field">
            <label class="label mb-3" for="id_pour_input_devises"> Devise : </label>
            <div class="control">
                <div class="select is-fullwidth">
                    <select name="currency" id="id_pour_input_devises">
                        <option value="EUR">Euro</option>
                        <option value="USD">Dollar américain</option>
                        <option value="JPY">Yen</option>
                        <option value="GBP">Livre sterling</option>
                        <option value="AUD">Dollar australien</option>
                        <option value="Autre">Autre</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Membres : on entre leurs emails pour les retrouver dans la table users -->
        <!-- Membre 1 obligatoire, les autres optionnels -->
        <div class="field">
            <label class="label mb-3" for="id_pour_input_email_membre_1"> Membre n°1 : </label>
            <div class="control">
                <input class="input is-small" type="email" name="member_1" placeholder="alexia@gmail.com" id="id_pour_input_email_membre_1" required>
            </div>
        </div>

        <div class="field">
            <label class="label mb-3" for="id_pour_input_email_membre_2"> Membre n°2 : </label>
            <div class="control">
                <input class="input is-small" type="email" name="member_2" placeholder="thomas@gmail.com" id="id_pour_input_email_membre_2">
            </div>
        </div>

        <div class="field">
            <label class="label mb-3" for="id_pour_input_email_membre_3"> Membre n°3 : </label>
            <div class="control">
                <input class="input is-small" type="email" name="member_3" placeholder="lola@gmail.com" id="id_pour_input_email_membre_3">
            </div>
        </div>

        <div class="field">
            <label class="label mb-3" for="id_pour_input_email_membre_4"> Membre n°4 : </label>
            <div class="control">
                <input class="input is-small" type="email" name="member_4" placeholder="carl@gmail.com" id="id_pour_input_email_membre_4">
            </div>
        </div>

        <!-- Bouton de soumission -->
        <button type="submit" class="button is-primary is-fullwidth has-text-white mt-4"> Créer le groupe </button>

        <!-- Lien retour vers la page d'accueil -->
        <br>
        <p class="has-text-centered">
            <a href="../index.html">← Retour à l'accueil</a>
        </p>

        </form>
                </div>
            </div>
        </section>
    </body>
</html>
