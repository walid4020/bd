<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <title> Inscription </title>
    </head>
    <body> 
        <form action="inscription_reception_des_donnees.php" method="post"> 
        <h1> Inscription </h1>

        <!-- Zones de texte -->
        <label for="id_pour_input_prenom"> Prénom : </label>
            <input type="text"name="firstname" placeholder="Claude" id="id_pour_input_prenom" required> 
        
        <label for="id_pour_input_nom"> Nom : </label>
            <input type="text"name="lastname" placeholder="Dupont" id="id_pour_input_nom"required> 
        
        
        <label for="id_pour_input_datedenaissance"> Date de naissance : </label>
            <input type="date"name="birthdate" id="id_pour_input_datedenaissance"> 

       <label for="id_pour_input_numero"> Téléphone : </label>
             <input type="tel"name="phonenumber" placeholder="0470123456" pattern="[0-9]{10}"id="id_pour_input_numero" required> 

        <label for="id_pour_input_pays"> Pays : </label>
             <select name="country"id="id_pour_input_pays">
                <option value="BEL">Belgique</option>
                <option value="FR">France</option>
                <option value="NL">Pays-Bas</option>
                <option value="LUX">Luxembourg</option>
                <option value="ES">Espagne </option>
                <option value="IT">Italie</option>
                <option value="Autre">Autre</option>
            </select> 
        
        <label for="id_pour_input_email"> Email: </label>
             <input type="email"name="email" placeholder="exemple.email@gmail.com" id="id_pour_input_email"required>

         <label for="id_pour_input_mdp"> Mot de passe :</label>
            <input type="password" id="id_pour_input_mdp" name="password" placeholder="Entrez votre mot de passe" minlength="8"required>
  
        <!-- AJOUTER qlq chose pour obliger à ce que le mdp soit le même dans la zone 7 et dans la zone 8-->
        <label for="id_pour_input_mdp_confirmation">Confirmez le mot de passe :</label>
            <input type="password" id="id_pour_input_mdp_confirmation" name="password_confirm" placeholder="Confirmez votre mot de passe" required>
             
        <!-- Zone bouton d'envoie-->
         <button type ="submit" name="bouton submit"> Envoyer </button>
    </body>
</html>
