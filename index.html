<!DOCTYPE html>
<html lang="fr"> 
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!--name="viewport" : Indique au navigateur qu'on va régler l'affichage de la fenêtre. -->
        <!--width=device-width : Force la largeur du site à être la même que celle de l'appareil (téléphone, tablette, etc.).-->
        <!--initial-scale=1.0 : Règle le zoom à 100% au chargement. Cela empêche le texte d'être tout petit.-->
       
        <title> Connexion </title>
        <!-- CSS : OK -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.0/css/bulma.min.css">
        <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700&display=swap" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
    </head>

    <body> 
        <div id="app">
            <template v-if="!currentUser">
                <section style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background-color: #f5f5f5; padding: 1.5rem;">
                    <div style="display: flex; width: 100%; max-width: 900px; min-height: 560px; border-radius: 16px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.12);">

                        <!-- Panneau gauche : image de présentation, masquée sur mobile -->
                        <div class="is-hidden-mobile" style="flex: 0 0 45%; background-image: url('assets/slogan.png'); background-size: cover; background-position: center;">
                        </div>

                        <!-- Panneau droit : formulaire de connexion -->
                        <div style="flex: 1; background: white; padding: 3rem 2.5rem; display: flex; flex-direction: column; justify-content: center;">

                            <!-- Logo centré en haut du formulaire -->
                            <div class="has-text-centered mb-5">
                                <img src="assets/logo.png" alt="Divvyo" style="max-height: 60px;">
                            </div>

                            <h1 class="title has-text-centered" style="color: var(--bulma-success-dark);"> Connexion </h1>

                            <!-- Message d'erreur affiché si identifiants incorrects -->
                            <div v-if="error" class="notification is-danger is-light">
                                <button class="delete" @click="error = ''"></button>
                                {{ error }}
                            </div>

                            <form @submit.prevent="login">
                                <div class="field">
                                    <label class="label" for="id_pour_input_email">Email</label>
                                    <div class="control">
                                        <input id="id_pour_input_email" required class="input" type="email" v-model="login_form.email" placeholder="exemple.email@gmail.com">
                                    </div>
                                </div>

                                <div class="field">
                                    <label class="label" for="id_pour_input_mdp">Mot de passe</label>
                                    <div class="control has-icons-right">
                                        <input id="id_pour_input_mdp" class="input" type="password" v-model="login_form.password" placeholder="••••••••" minlength="8" required>
                                        <!-- Icône œil cliquable pour afficher/masquer le mot de passe -->
                                        <span class="icon is-right" style="pointer-events: all; cursor: pointer;" onclick="togglePassword('id_pour_input_mdp', this)">
                                            👁️
                                        </span>
                                    </div>
                                </div>

                                <div class="field">
                                    <label>
                                        <input type="checkbox" v-model="login_form.remember">
                                        Se souvenir de moi (cookie persistant 30 jours)
                                    </label>
                                </div>

                                <button type="submit" class="button is-success is-fullwidth has-text-white mt-4">Se connecter</button>

                                <p class="has-text-centered mt-4">
                                    Pas encore de compte ? <a href="pages/formulaire_inscription.html">S'inscrire</a>
                                </p>
                            </form>

                        </div>
                    </div>
                </section>
            </template>
            <!-- Page d'accueil affichée une fois l'utilisateur connecté -->
            <template v-else>
                <nav class="navbar is-success" style="background-color: var(--bulma-success-dark);" role="navigation" aria-label="navigation principale">
                    <!-- Partie gauche : logo cliquable qui ramène à l'accueil -->
                    <div class="navbar-brand">
                        <a class="navbar-item" href="index.html">
                            <img src="assets/logo.png" alt="Divvyo" style="max-height: 56px;">
                        </a>

                        <!-- Bouton hamburger sur mobile : Vue gère l'ouverture via menuOuvert -->
                        <a role="button" class="navbar-burger" :class="{'is-active': menuOuvert}"
                        aria-label="menu" @click="menuOuvert = !menuOuvert">
                            <span aria-hidden="true"></span>
                            <span aria-hidden="true"></span>
                            <span aria-hidden="true"></span>
                        </a>
                    </div>

                    <!-- Menu principal : is-active ajouté par Vue quand menuOuvert est vrai -->
                    <div class="navbar-menu" :class="{'is-active': menuOuvert}">
                        <div class="navbar-end">
                            <a href="index.html" class="navbar-item has-text-white">Accueil</a>
                            <a href="api/formulaire_choix_de_groupe.php" class="navbar-item has-text-white">Mes groupes</a>
                            <a href="pages/formulaire_creation_groupe.html" class="navbar-item has-text-white">Créer un groupe</a>
                            <a @click="logout" href="#" class="navbar-item has-text-white" style="font-weight: 600;">Se déconnecter</a>
                        </div>
                    </div>
                </nav>
                <section class="section">
                    <div class="container" style="max-width: 600px;">
                        <div class="box">

                            <!-- Message de bienvenue avec le prénom et nom de l'utilisateur -->
                            <h1 class="title has-text-success-bold has-text-centered">
                                Bonjour, {{ currentUser.displayName }} 👋
                            </h1>
                            <p class="has-text-centered mb-5">Que voulez-vous faire ?</p>

                            <!-- Navigation vers les différentes fonctionnalités de l'app -->
                            <div class="buttons is-flex is-flex-direction-column">

                                <!-- Accès à la liste des groupes de l'utilisateur -->
                                <a href="api/formulaire_choix_de_groupe.php" class="button is-success is-soft is-fullwidth">
                                    Mes groupes
                                </a>

                                <!-- Créer un nouveau groupe de dépenses -->
                                <a href="pages/formulaire_creation_groupe.html" class="button is-success is-soft is-fullwidth">
                                    Créer un groupe
                                </a>

                                <!-- Créer une nouvelle dépense dans un groupe -->
                               <a href="api/formulaire_choix_de_groupe.php" class="button is-success is-soft is-fullwidth">
                                    Créer une dépense
                                </a>

                                <!-- Bouton de déconnexion : détruit la session et reaffiche le formulaire de login. -->
                                <a @click="logout" href="#" class="button is-danger is-light is-fullwidth">
                                    🚪 Se déconnecter
                                </a>
                            </div>

                        </div>
                    </div>
                </section>
            </template>
        </div>
        <script>
            // Fonction qui bascule entre afficher et masquer le mot de passe
            function togglePassword(inputId, icon) {
                const input = document.getElementById(inputId);
                if (input.type === 'password') {
                    input.type = 'text';   // on affiche le mot de passe
                    icon.textContent = '🙉'; // on change l'icône
                } else {
                    input.type = 'password'; // on masque le mot de passe
                    icon.textContent = '🙈'; // on remet l'icône
                }
            }
        </script>
        <script src="app.js"></script>
    </body>
</html>
